name: Test skip-auth bypasses authorization check
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with skip-auth=true (expect failure at binary setup, not auth)
        id: action
        uses: .
        with:
          agent: docker/code-analyzer
          skip-auth: "true"
          openai-api-key: "sk-fake-key-for-testing"
          timeout: "10"
          max-retries: "0"
        continue-on-error: true
      - name: Assert action failed (at binary setup, not at auth)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          SECURITY_BLOCKED: ${{ steps.action.outputs.security-blocked }}
        run: |
          echo "outcome: $OUTCOME"
          echo "security-blocked: $SECURITY_BLOCKED"
          # The action should fail (no docker agent binary available in test env)
          # but NOT because of auth (security-blocked should not be 'true' for auth failure)
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (no docker agent binary), got outcome=$OUTCOME"
            exit 1
          fi
          if [ "$SECURITY_BLOCKED" = "true" ]; then
            echo "FAIL: action was security-blocked, but skip-auth should have bypassed auth"
            exit 1
          fi
          echo "PASS: action failed at binary setup (not at auth), skip-auth worked correctly"
      - name: Assert output-file output is set (set before binary execution)
        env:
          OUTPUT_FILE: ${{ steps.action.outputs.output-file }}
        run: |
          echo "output-file: $OUTPUT_FILE"
          # output-file is set early in the action before running docker agent
          # It may be empty if action failed before that point, which is acceptable
          echo "PASS: output-file output checked"
